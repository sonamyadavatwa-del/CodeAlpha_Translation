<!DOCTYPE html>
<html>
<head>
    <title>Language Translator</title>
</head>
<body style="text-align:center; font-family:Arial;">

    <h2>🌍 Language Translation Tool</h2>

    <textarea id="inputText" rows="5" cols="30" placeholder="Enter text"></textarea><br><br>

    <select id="fromLang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
    </select>

    ➡️

    <select id="toLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
    </select>

    <br><br>

    <button onclick="translateText()">Translate</button>

    <h3 id="output"></h3>

    <script>
        async function translateText() {
            let text = document.getElementById("inputText").value;
            let from = document.getElementById("fromLang").value;
            let to = document.getElementById("toLang").value;

            let url = `https://api.mymemory.translated.net/get?q=${text}&langpair=${from}|${to}`;

            let res = await fetch(url);
            let data = await res.json();

            document.getElementById("output").innerText = data.responseData.translatedText;
        }
    </script>

</body>
                                                                                          </html>
